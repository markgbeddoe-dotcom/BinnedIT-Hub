<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkipSync</title>
  <link rel="manifest" href="/manifest.json" id="pwa-manifest">
  <meta name="theme-color" content="#EFDF0F" id="pwa-theme-color">
  <link rel="apple-touch-icon" href="/logo.jpg">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/jpeg" href="/logo.jpg">
  <script>
    // Sprint 11D: switch to driver-specific PWA manifest when running under /driver/*.
    // Synchronous so it happens before the browser parses the install prompt.
    // (Audit-ux.md §3 P0: single-manifest meant 'Install SkipSync' from /driver
    // installed the admin Hub instead of the driver app.)
    (function () {
      try {
        if (window.location.pathname === '/driver' || window.location.pathname.indexOf('/driver/') === 0) {
          document.getElementById('pwa-manifest').setAttribute('href', '/driver-manifest.json');
          var theme = document.getElementById('pwa-theme-color');
          if (theme) theme.setAttribute('content', '#1A1A2E');
        }
      } catch (e) { /* non-fatal */ }
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#F2F6F4; color:#000006; font-family:'DM Sans',system-ui,sans-serif; }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:#F2F6F4; }
    ::-webkit-scrollbar-thumb { background:#B0B8B4; border-radius:3px; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
    input[type=number] { -moz-appearance:textfield; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Sprint 12 #16: register a different service worker per scope so the
    // admin Hub and the driver app don't share a runtime cache. Driver paths
    // (`/driver` and below) get `/sw-driver.js` scoped to `/driver/`; every
    // other path stays on the existing admin `/sw.js`.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        var path = window.location.pathname;
        var isDriver = path === '/driver' || path.indexOf('/driver/') === 0;
        var swUrl = isDriver ? '/sw-driver.js' : '/sw.js';
        var opts = isDriver ? { scope: '/driver/' } : { scope: '/' };
        navigator.serviceWorker.register(swUrl, opts).then(reg => {
          console.log('SW registered:', swUrl, reg.scope);
        }).catch(err => {
          console.log('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
